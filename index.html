<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>絵画を聴く</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>絵画を聴く</h1>
        <p class="subtitle">ミキキの交差点</p>
    </header>

    <div class="section">
        <div class="section-title">Input</div>
        <button id="btn-record" class="record-btn">録音を開始</button>
    </div>

    <div class="section">
        <div class="section-title">Master Control</div>
        <div class="control-row">
            <button id="btn-play">一斉再生</button>
            <button id="btn-stop">一斉停止</button>
            <button id="btn-master-loop" class="active">全体ループ: ON</button>
        </div>
        <div class="slider-wrapper">
            <label>Reverb</label>
            <input type="range" id="master-reverb" min="0" max="1" step="0.01" value="0.3">
        </div>
    </div>

    <div class="section">
        <div class="section-title">Cloud Tracks</div>
        <div id="empty-msg">クラウドからトラックを読み込み中...</div>
        <div class="track-list" id="track-list"></div>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
