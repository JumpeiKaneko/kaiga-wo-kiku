<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>絵画を聴く - ミキキの交差点</title>
    
    <link rel="stylesheet" href="style.css?v=20260621_final">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
</head>
<body>

<div id="user-modal" class="modal-overlay">
    <div class="modal-content" id="modal-step-1">
        <h2>絵画を聴く</h2>
        <div class="auth-buttons">
            <button id="btn-choice-first" class="menu-choice-btn">初めて利用する</button>
            <button id="btn-choice-return" class="menu-choice-btn">2回目以降（再開）</button>
        </div>
    </div>
    
    <div class="modal-content" id="modal-step-2" style="display: none;">
        <h2 id="modal-input-title">ユーザー名を入力してください</h2>
        <input type="text" id="input-username" placeholder="name">
        <button id="btn-login">ログイン</button>
        <button id="btn-back-step" class="action-btn-back">戻る</button>
    </div>
</div>

<div class="container" id="main-app" style="display: none;">
    <header>
        <h1>絵画を聴く<span class="subtitle">ミキキの交差点 [User: <span id="current-user-display"></span>]</span></h1>
    </header>

    <div class="section">
        <div class="section-title">Input</div>
        <button id="btn-record" class="record-btn">録音を開始</button>
    </div>

    <div class="section">
        <div class="section-title">Master Control</div>
        <div class="control-row">
            <button id="btn-play">一斉再生</button>
            <button id="btn-rewind">最初に戻す</button>
            <button id="btn-stop">一斉停止</button>
            <button id="btn-master-loop" class="active">全体ループ: ON</button>
        </div>
        <div class="slider-wrapper">
            <label>Reverb</label>
            <input type="range" id="master-reverb" min="0" max="1" step="0.01" value="0">
        </div>
    </div>

    <div class="section">
        <div class="section-title">Mixer</div>
        <div id="empty-msg">トラックを読み込み中...</div>
        <div class="track-list" id="track-list"></div>
    </div>

    <div class="section">
        <div class="section-title">Timeline</div>
        <div class="timeline-wrapper" id="timeline-wrapper">
            <div class="timeline-container" id="timeline-container">
                <div class="playhead" id="playhead"></div>
                <div id="timeline-tracks"></div>
            </div>
        </div>
    </div>

    <div class="section" id="export-section">
        <div class="section-title">Export</div>
        <input type="text" id="input-export-name" class="export-name-input" placeholder="完成音源のタイトルを入力">
        <button id="btn-export-master" class="record-btn">作品を完成させる</button>
        
        <div id="output-player-container" style="display: none;">
            <div class="track-item">
                <div class="track-name" id="output-file-name">Master Track</div>
                <div class="track-controls">
                    <button id="btn-output-play" class="action-btn">再生</button>
                    <button id="btn-output-stop" class="action-btn">停止</button>
                    <button id="btn-output-download" class="action-btn-download">保存</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="app.js?v=20260621_final"></script>
</body>
</html>
